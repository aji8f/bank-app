version: 0.0
os: linux

# AWS CodeDeploy appspec for Blue/Green ECS deployment
Resources:
  - TargetService:
      Type: AWS::ECS::Service
      Properties:
        TaskDefinition: <TASK_DEFINITION>
        LoadBalancerInfo:
          ContainerName: "simple-banking-app"
          ContainerPort: 80
        PlatformVersion: "LATEST"
        NetworkConfiguration:
          awsvpcConfiguration:
            subnets:
              - <SUBNET_1>
              - <SUBNET_2>
            securityGroups:
              - <SECURITY_GROUP>
            assignPublicIp: ENABLED
        CapacityProviderStrategy:
          - Base: 1
            CapacityProvider: FARGATE
            Weight: 1

Hooks:
  - BeforeInstall:
      - location: scripts/before_install.sh
        timeout: 300
        runas: root
  - AfterInstall:
      - location: scripts/after_install.sh
        timeout: 300
        runas: root
  - ApplicationStart:
      - location: scripts/start_server.sh
        timeout: 300
        runas: root
  - ApplicationStop:
      - location: scripts/stop_server.sh
        timeout: 60
        runas: root
  - ValidateService:
      - location: scripts/validate_service.sh
        timeout: 300
        runas: root
