version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-banking-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: simple_banking
      DB_USERNAME: banking_user
      DB_PASSWORD: banking_secret
      CACHE_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - banking-network

  mysql:
    image: mysql:8.0
    container_name: simple-banking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: simple_banking
      MYSQL_USER: banking_user
      MYSQL_PASSWORD: banking_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "banking_user", "-pbAnking_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  redis:
    image: redis:7-alpine
    container_name: simple-banking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  # phpMyAdmin for easy DB management (development only)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: simple-banking-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: banking_user
      PMA_PASSWORD: banking_secret
    depends_on:
      - mysql
    networks:
      - banking-network
    profiles:
      - debug

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  banking-network:
    driver: bridge
